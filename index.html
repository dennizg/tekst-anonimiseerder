<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com;" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="help" href="/privacy.html" title="Privacybeleid">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anonimiseer teksten lokaal en veilig in je browser. Geen AI, geen servers — 100% privacy." />
    <title>(De-)Anonimiseerder — Veilig & Lokaal</title>
  </head>
  <body>
    <noscript>
      Dit is een volledig client-side (offline) applicatie. JavaScript is vereist om deze tool te gebruiken.
      Wij hechten veel waarde aan privacy; al uw gegevens blijven 100% lokaal in uw browser. 
      Bekijk ons <a href="/privacy.html">Privacybeleid</a> voor meer informatie over hoe wij transparantie garanderen.
    </noscript>
    <div id="root">
      <style>
        .app-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: system-ui, -apple-system, sans-serif;
          background-color: #f8f9fa;
        }
        .app-loader-spinner {
          width: 50px;
          height: 50px;
          border: 5px solid #e5e7eb;
          border-top-color: #3b82f6;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
        }
        .app-loader-text {
          color: #4b5563;
          font-size: 1.1rem;
          font-weight: 500;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @media (prefers-color-scheme: dark) {
          .app-loader { background-color: #111827; }
          .app-loader-spinner { border-color: #374151; border-top-color: #60a5fa; }
          .app-loader-text { color: #9ca3af; }
        }
      </style>
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Tekst Anonimiseerder wordt klaargezet...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
