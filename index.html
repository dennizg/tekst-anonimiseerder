<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self';" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anonimiseer teksten lokaal en veilig in je browser. Geen AI, geen servers — 100% privacy." />
    <title>Tekst Anonimiseerder — Veilig & Lokaal</title>
  </head>
  <body>
    <div id="root">
      <style>
        .app-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family: system-ui, -apple-system, sans-serif;
          background-color: #f8f9fa;
        }
        .app-loader-spinner {
          width: 50px;
          height: 50px;
          border: 5px solid #e5e7eb;
          border-top-color: #3b82f6;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 20px;
        }
        .app-loader-text {
          color: #4b5563;
          font-size: 1.1rem;
          font-weight: 500;
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        @media (prefers-color-scheme: dark) {
          .app-loader { background-color: #111827; }
          .app-loader-spinner { border-color: #374151; border-top-color: #60a5fa; }
          .app-loader-text { color: #9ca3af; }
        }
      </style>
      <div class="app-loader">
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Tekst Anonimiseerder wordt klaargezet...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
